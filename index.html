<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LATCINTL - Pi Marketplace</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>LATCINTL</h1>
    <div id="user-info"></div>
    <button id="login-btn">Login with Pi</button>
  </header>

  <nav>
    <button onclick="showCategory('fabrics')">Fabrics & Atamfa</button>
    <button onclick="showCategory('men')">Men's Clothing</button>
    <button onclick="showCategory('women')">Women's Clothing</button>
    <button onclick="showCategory('kids')">Children's Clothing</button>
  </nav>

  <main id="products"></main>

  <div id="cart">
    <h2>Cart (<span id="cart-count">0</span>)</h2>
    <div id="cart-items"></div>
    <button id="checkout-btn">Checkout with Pi</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
